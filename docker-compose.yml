services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nomadbase
      POSTGRES_USER: nomadbase
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomadbase"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    ports:
      - "8097:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://nomadbase@db:5432/nomadbase
      DEBUG: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import json,sys,urllib.request; resp = urllib.request.urlopen('http://127.0.0.1:8000/api/health'); data = json.load(resp); sys.exit(0 if resp.status == 200 and data.get('database') else 1)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 45s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5000:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
