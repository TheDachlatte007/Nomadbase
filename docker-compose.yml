services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nomadbase
      POSTGRES_USER: nomadbase
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nomadbase_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomadbase"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    ports:
      - "8097:8097"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://nomadbase:${DB_PASSWORD:-nomadbase_dev}@db:5432/nomadbase
      DEBUG: "false"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
