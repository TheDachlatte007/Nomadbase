services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: nomadbase
      POSTGRES_USER: nomadbase
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nomadbase"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://nomadbase@db:5432/nomadbase
      APP_ENV: alpha
      DEBUG: "false"
      CORS_ALLOW_ORIGINS: "*"
      TRUSTED_HOSTS: "*"
      ENABLE_GZIP: "true"
      IMPORT_AUTO_QUEUE_ON_CITY_CREATE: "true"
    restart: unless-stopped

volumes:
  postgres_data:
